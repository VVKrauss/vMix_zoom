services:
  caddy:
    image: caddy:2.9.1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:17.6
    restart: unless-stopped
    environment:
      POSTGRES_DB: redflow
      POSTGRES_USER: redflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - redflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redflow -d redflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - /opt/redflow/shared/api.env
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://redflow:${POSTGRES_PASSWORD}@postgres:5432/redflow
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  redflow_pg:
  caddy_data:
  caddy_config:

