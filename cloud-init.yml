#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# vMix Streamer — Cloud-init
# Протестировано на Ubuntu 22.04 LTS
#
# !! ПЕРЕД ИСПОЛЬЗОВАНИЕМ !!
# Замените GITHUB_TOKEN ниже на свой Personal Access Token:
#   GitHub → Settings → Developer settings → Personal access tokens → Fine-grained
#   Права: Contents → Read-only  (только для этого репо)
#
# Вставить файл в поле "User data" при создании VPS.
# Логи: sudo tail -f /var/log/cloud-init-output.log
# ─────────────────────────────────────────────────────────────────────────────

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - ufw
  - ca-certificates
  - gnupg
  - lsb-release
  - htop
  - ffmpeg
  - build-essential
  - python3
  - python3-pip

runcmd:
  # ── 1. Docker ────────────────────────────────────────────────────────────────
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker

  # ── 2. Firewall ──────────────────────────────────────────────────────────────
  - ufw --force reset
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 3000/tcp
  - ufw allow 9001:9010/udp
  - ufw allow 40000:49999/udp
  - ufw allow 40000:49999/tcp
  - ufw --force enable

  # ── 3. Клонировать репозиторий (с токеном для приватного репо) ────────────────
  - |
    # !! Замените YOUR_GITHUB_TOKEN на реальный токен !!
    GITHUB_TOKEN="YOUR_GITHUB_TOKEN"
    REPO_URL="https://${GITHUB_TOKEN}@github.com/VVKrauss/vMix_zoom.git"

    echo "[clone] Cloning repository..." >> /var/log/vmix-streamer-init.log
    git clone "$REPO_URL" /opt/vmix-streamer 2>> /var/log/vmix-streamer-init.log

    if [ ! -d "/opt/vmix-streamer" ]; then
      echo "[ERROR] Clone failed! Check token or repo URL." >> /var/log/vmix-streamer-init.log
      exit 1
    fi

    echo "[clone] OK" >> /var/log/vmix-streamer-init.log

  # ── 4. Определить внешний IP и создать .env ───────────────────────────────────
  - |
    PUBLIC_IP=$(curl -s --max-time 5 https://api.ipify.org \
             || curl -s --max-time 5 https://ipv4.icanhazip.com \
             || curl -s --max-time 5 http://ifconfig.me)

    echo "[env] Public IP: ${PUBLIC_IP}" >> /var/log/vmix-streamer-init.log

    cat > /opt/vmix-streamer/.env <<ENVEOF
ANNOUNCED_IP=${PUBLIC_IP}
PORT=3000
SRT_BASE_PORT=9001
MAX_PEERS=10
MEDIASOUP_WORKER_COUNT=2
RTC_MIN_PORT=40000
RTC_MAX_PORT=49999
RTP_BASE_PORT=20000
ENVEOF

    echo "[env] .env created" >> /var/log/vmix-streamer-init.log

  # ── 5. Запустить через Docker Compose ─────────────────────────────────────────
  - |
    echo "[docker] Building and starting containers..." >> /var/log/vmix-streamer-init.log
    cd /opt/vmix-streamer
    docker compose up -d --build >> /var/log/vmix-streamer-init.log 2>&1
    echo "[docker] Done at $(date)" >> /var/log/vmix-streamer-init.log

  # ── 6. Systemd-юнит для автозапуска ───────────────────────────────────────────
  - |
    cat > /etc/systemd/system/vmix-streamer.service <<SVCEOF
[Unit]
Description=vMix Streamer (Docker Compose)
After=docker.service network-online.target
Requires=docker.service

[Service]
Type=oneshot
RemainAfterExit=yes
WorkingDirectory=/opt/vmix-streamer
ExecStart=/usr/bin/docker compose up -d
ExecStop=/usr/bin/docker compose down
TimeoutStartSec=300

[Install]
WantedBy=multi-user.target
SVCEOF
    systemctl daemon-reload
    systemctl enable vmix-streamer
    echo "[systemd] vmix-streamer.service enabled" >> /var/log/vmix-streamer-init.log

final_message: |
  ✅ vMix Streamer cloud-init завершён за $UPTIME секунд.
  Подробные логи: /var/log/vmix-streamer-init.log
  Статус контейнеров: docker compose -f /opt/vmix-streamer/docker-compose.yml ps
