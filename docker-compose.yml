version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      # Socket.io / API
      - "3000:3000"
      # WebRTC UDP/TCP (mediasoup)
      - "40000-49999:40000-49999/udp"
      - "40000-49999:40000-49999/tcp"
      # SRT ports for vMix (one per participant)
      - "9001-9010:9001-9010/udp"
    volumes:
      - /tmp:/tmp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount your SSL certs here for HTTPS (required for getUserMedia in production)
      # - /etc/letsencrypt:/etc/letsencrypt:ro
