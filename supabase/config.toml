# Для CLI (`supabase link`): актуальный ref/host задаётся при линковке; не захардкоженный Cloud-проект.
project_id = "redflow-online"

[db]
major_version = 17

# Вызов только из Database Webhook (Bearer WEBHOOK_PUSH_SECRET), без JWT пользователя.
[functions.send-dm-webpush]
verify_jwt = false

[functions.send-channel-webpush]
verify_jwt = false
